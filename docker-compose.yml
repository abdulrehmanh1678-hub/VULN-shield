services:
  vulnshield:
    build: .
    ports:
      - "5000:5000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - vulnshield-data:/app/server/data
    restart: unless-stopped

volumes:
  vulnshield-data:
